# nginx config for the UI sidecar. Serves the built dist/ as a static site and
# the loop daemon's contract from the bind-mounted data dir, so the UI always
# renders the daemon's latest emit (the daemon is the sole writer).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Prefer the daemon-emitted precompressed contract, with on-the-fly gzip as
    # fallback. Serving contract.json.gz lets native thin clients see the encoded
    # Content-Length from the same contract response (Diagnostics transfer size),
    # while gzip_vary keeps caches/proxies correct. Only clients that send
    # Accept-Encoding: gzip get compressed bytes — browsers always do, and the
    # desktop Tauri client does too when built with the plugin-http `gzip`
    # feature; any other client still gets the plain payload.
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        application/wasm
        text/css
        text/plain
        image/svg+xml;

    # The daemon-emitted contract, served straight from data/contract.json
    # (mounted read-only at /srv/data). The UI fetches "./contract.json"; no-store
    # so a reload always pulls the freshest emit rather than a cached copy.
    location = /contract.json {
        alias /srv/data/contract.json;
        default_type application/json;
        add_header Cache-Control "no-store";
    }

    # Raw precompressed bytes for Diagnostics metadata in native clients. The
    # Tauri HTTP layer transparently decodes /contract.json and hides the
    # encoded headers, so the UI can HEAD this route to recover the gzip length
    # without downloading or parsing another contract.
    location = /contract.json.gz {
        alias /srv/data/contract.json.gz;
        gzip off;
        gzip_static off;
        default_type application/gzip;
        add_header Cache-Control "no-store";
    }

    # UI-triggered manual sync control plane. These routes target the writer-owned
    # board daemon (NOT the read-only api sidecar), which owns the single run lock
    # and the contract emit. board's control port is internal to the compose
    # network and is never published to the host. A more specific prefix/exact
    # match wins over the /api/ block below, so range queries still hit api.
    location = /api/sync-control {
        proxy_pass http://board:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store";
    }
    location /api/sync-runs {
        proxy_pass http://board:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store";
    }

    # Writer-owned config and write-only secrets control plane for Settings ->
    # Sources. The board daemon still decides whether these are enabled through
    # CONFIG_CONTROL_ENABLED and requires the same same-origin mutation header.
    location = /api/config {
        proxy_pass http://board:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store";
    }
    location = /api/secrets {
        proxy_pass http://board:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store";
    }

    # Recent-log tail for the UI Diagnostics page (#/debug). The buffer lives
    # in the writer daemon's process memory, so this MUST target board, not the
    # api sidecar (whose own logs are not the ones being debugged).
    location = /api/logs {
        proxy_pass http://board:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store";
    }

    # On-demand GitHub GraphQL rate-limit probe for the Diagnostics page. The
    # probe authenticates with the configured tokens and reaches out to the
    # provider, so it MUST target the writer daemon (which owns config + token
    # resolution + outbound provider access), not the read-only api sidecar. A
    # short read timeout keeps a stalled provider from hanging the tab.
    location = /api/token-rate-limits {
        proxy_pass http://board:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        add_header Cache-Control "no-store";
    }

    # Live event stream (SSE) and snapshot from the least-privilege live
    # receiver's READS listener (live:8090; NOT api/board). proxy_buffering off so
    # SSE frames flush immediately, and a long proxy_read_timeout so the
    # idle-but-open stream is not dropped as idle. These routes are private reads;
    # the public /webhooks path is served by the live receiver's SEPARATE webhook
    # listener (its own port) through deployment-owned public ingress and is NEVER
    # proxied here. The exact snapshot match wins over the /api/live prefix.
    location = /api/live-snapshot {
        proxy_pass http://live:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store";
    }
    location /api/live {
        proxy_pass http://live:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        add_header Cache-Control "no-store";
    }

    # Read-only historical range queries and store stats (/api/range,
    # /api/stats). The API sidecar opens the configured store read-only; the
    # board daemon remains the sole writer.
    location /api/ {
        proxy_pass http://api:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store";
    }

    # The board is a hash-routed SPA (#/, #/graph, #/settings), so every path that
    # is not a real asset resolves to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

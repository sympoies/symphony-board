name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Backend (root package) + the contract package: no build, just the type gate
  # and the pure/DB tests. Node strips TS types at runtime without checking them.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # pnpm is the package manager; version comes from package.json packageManager.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version # same Node as fnm uses locally
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      # Fail if a release-shipped app (desktop / desktop-standalone / android)
      # drifts from the root package.json version. The release bump is manual.
      - run: pnpm run check:app-versions
      - run: pnpm test

  # UI (packages/ui): the one package with a build step + heavy deps. Typecheck +
  # production build + the pure model tests. Kept a separate job so the backend
  # gate above stays buildless.
  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @symphony-board/ui run build
      - run: pnpm --filter @symphony-board/ui run test
      # Headless render smoke: actually render the built board in Chrome and
      # assert it draws (item cards + all 3 edge lifecycle buckets) with zero
      # console errors. Catches render-only crashes that tsc/build/unit tests
      # can't.
      - uses: browser-actions/setup-chrome@v1
        id: chrome
      - run: pnpm --filter @symphony-board/ui run smoke
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}

  # PgStore gate: the store conformance suite with the Postgres driver
  # registered, plus the live e2e (from zero through migrate, full sync,
  # incremental, disappearance sweep, contract emit, and the writer-lease
  # guarantees) against a real Postgres composed up by scripts/ci/pg-e2e.sh.
  # Separate job: `check` stays Docker-free, exactly like local `pnpm test`.
  pg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:pg-e2e

  # Deployment gate for the opt-in Postgres compose stack: builds the backend
  # and UI images, starts an isolated postgres/board/api/web project, then
  # verifies /contract.json, /api/stats, and the writer control surface.
  pg_compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:pg-compose

  # Shell-lint every helper under scripts/. They run unbuilt (no Node, no build
  # step), so shellcheck is the only static gate they get; ubuntu-latest ships
  # it preinstalled.
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: shellcheck
        run: |
          shellcheck --version
          find scripts -name '*.sh' -type f -print0 | xargs -0 shellcheck

  # Coverage gate (mirrors nils-cli's `--fail-under-lines`). Combined LINE
  # coverage across the backend (`src/**/*.ts`, incl. the untested CLI/glue,
  # counted honestly) and the UI `.ts` view-model. The `.tsx` component layer is
  # NOT a coverage % — it is gated by the `ui` job's headless render-smoke, since
  # V8 coverage of the Vite bundle remaps to a meaningless ~100%-if-loaded.
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Coverage gate
        run: pnpm coverage
        env:
          COVERAGE_FAIL_UNDER_LINES: "85"
      # Job summary + sticky PR comment (worst-covered files first). Runs even
      # when the gate failed — coverage/lcov.info is written before the check.
      - name: Coverage summary
        if: always() && hashFiles('coverage/lcov.info') != ''
        run: |
          GITHUB_STEP_SUMMARY=coverage/summary.md bash scripts/ci/coverage-summary.sh coverage/lcov.info
          cat coverage/summary.md >> "$GITHUB_STEP_SUMMARY"
      # Keep the coverage number visible on the PR itself. marocchino edits one
      # comment in place (recreate defaults to false); GitHub only notifies on
      # comment *creation*, not edits, so CI re-runs are silent and this emails
      # at most once, when the comment first appears on a PR. (#437 removed it on
      # a mistaken "emails on every run"; edit-in-place never did.) The body is
      # the coverage table — no @-mentions — so edits stay silent. Same-repo PRs
      # only (forks lack a writable token); best-effort, never fails the job.
      - name: PR comment (sticky coverage summary)
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && hashFiles('coverage/summary.md') != ''
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: coverage/summary.md
      - name: Upload coverage LCOV
        if: always() && hashFiles('coverage/lcov.info') != ''
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info

  # Publish the coverage badge to the `coverage-badge` orphan branch (no external
  # service). The README references badges/coverage.svg on that branch. Default
  # branch pushes only — PRs read the number from the `coverage` job's summary.
  coverage_badge:
    runs-on: ubuntu-latest
    needs: [coverage]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: coverage-lcov
          path: coverage
      - name: Generate badge
        run: |
          mkdir -p /tmp/badge
          bash scripts/ci/coverage-badge.sh coverage/lcov.info /tmp/badge/coverage.svg
      - name: Publish to coverage-badge branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin coverage-badge || true
          if git show-ref --verify --quiet refs/remotes/origin/coverage-badge; then
            git checkout -B coverage-badge origin/coverage-badge
          else
            git checkout --orphan coverage-badge
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p badges
          cp /tmp/badge/coverage.svg badges/coverage.svg
          git add badges/coverage.svg
          if git diff --staged --quiet; then
            echo "Coverage badge unchanged."
          else
            git commit -m "chore: update coverage badge"
            git push origin HEAD:coverage-badge
          fi

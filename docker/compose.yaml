# Three services: the loop daemon (board) — the always-on writer that syncs +
# emits data/contract.json; a read-only range API sidecar (api) that reads the
# canonical DB; and a read-only UI sidecar (web) that serves the built board plus
# that daemon-emitted contract over HTTP.
#
# Reads tokens from a gitignored .env (GITHUB_TOKEN, GITLAB_TOKEN, ...). Config
# and the DB are bind-mounted so the SQLite store survives container rebuilds and
# can be backed up from the host.
#
# Paths are relative to this file (docker/), so the repo root is "..". Run from
# anywhere with `docker compose -f docker/compose.yaml up -d --build`.
#
#   echo "GITHUB_TOKEN=ghp_xxx" > .env                    # at the repo root
#   cp config/sources.example.json config/sources.json    # then edit
#   docker compose -f docker/compose.yaml up -d --build
#   docker compose -f docker/compose.yaml logs -f
#   open http://localhost:8080                            # the served board

# Pin the Compose project name to the repo. Without this it would default to the
# compose file's directory ("docker"), which is unhelpful when several projects
# share a Docker host; "symphony-board" makes the containers
# (symphony-board-board-1 / symphony-board-api-1 / symphony-board-web-1) and the
# project group obvious.
name: symphony-board

services:
  board:
    image: ghcr.io/sympoies/symphony-board:${SYMPHONY_IMAGE_TAG:-dev}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      SYNC_MODE: loop
      INTERVAL: "120"
      # Mostly-incremental cadence: a full sweep (which alone may soft-delete
      # disappeared items/edges) every FULL_EVERY iterations, incremental in
      # between. 30 x 120s ~= a full sweep hourly. Set to 1 to always full-sweep.
      FULL_EVERY: "30"
      # Per-request network timeout (ms). Bounds each provider fetch so a stalled
      # socket (e.g. a half-up network/VPN right after the host wakes) fails that
      # source cleanly and the iteration moves on, instead of hanging for minutes.
      # A timeout reads as an incomplete fetch, so it never soft-deletes.
      SYNC_FETCH_TIMEOUT_MS: "30000"
      SYMPHONY_CONFIG: config/sources.json
      CONTRACT_OUT: data/contract.json
      # UI-triggered manual sync: the loop daemon serves a writer-owned control
      # surface on SYNC_CONTROL_PORT (reached by the web sidecar over the compose
      # network — deliberately NOT published to the host). Manual runs are enabled
      # here for the local deployment; remove SYNC_CONTROL_ENABLED to keep the
      # daemon timer-only with the endpoint refusing manual runs.
      SYNC_CONTROL_ENABLED: "1"
      SYNC_CONTROL_PORT: "8080"
      # Recent-log tail for the UI Diagnostics page (#/debug): the daemon keeps
      # an in-memory ring buffer of its own log lines and serves it on
      # GET /api/logs (proxied by the web sidecar). Read-only; remove to keep
      # the tail off this deployment.
      LOG_CONTROL_ENABLED: "1"
    env_file:
      - path: ../.env
        required: false
    volumes:
      - ../config:/app/config:ro
      - ../data:/app/data
    # Health = the daemon is actually producing the contract. It passes once
    # data/contract.json exists and was rewritten recently (well inside one full
    # cadence: 30 min >> INTERVAL 120s), so a wedged or crash-looping daemon that
    # stops emitting is reported unhealthy. start_period covers the first
    # sync+emit. The UI sidecar (web) gates on this via depends_on.
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "try{const s=require('fs').statSync('/app/data/contract.json');process.exit(Date.now()-s.mtimeMs<1800000?0:1)}catch{process.exit(1)}"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s

  # Read-only range-query sidecar. It shares the backend image but runs
  # SYNC_MODE=api, mounts config/data read-only, and never syncs or emits. The
  # web sidecar proxies /api/... to this service.
  api:
    image: ghcr.io/sympoies/symphony-board:${SYMPHONY_IMAGE_TAG:-dev}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      SYNC_MODE: api
      SYMPHONY_CONFIG: config/sources.json
      PORT: "8081"
    volumes:
      - ../config:/app/config:ro
      - ../data:/app/data:ro
    depends_on:
      board:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:8081/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Least-privilege Live receiver (Sprint 5): verifies inbound GitHub webhooks,
  # owns its OWN live.db (the live-data volume), and serves the tailnet-only SSE
  # + snapshot. It mounts NO config and holds NO provider token — only the
  # webhook secret(s), passed by name via `environment:` interpolation, NOT
  # env_file (which would leak GITHUB_TOKEN). It never opens the canonical store.
  # It listens on 0.0.0.0 inside the compose network so the web sidecar can proxy
  # /api/live*; its only host port is loopback, for the host Tailscale Funnel to
  # reach the public /webhooks path. SSE/snapshot are NEVER funneled.
  live:
    image: ghcr.io/sympoies/symphony-board:${SYMPHONY_IMAGE_TAG:-dev}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      SYNC_MODE: live
      LIVE_BIND_HOST: 0.0.0.0
      LIVE_PORT: "8090"
      LIVE_DB_PATH: data/live.db
      WEBHOOK_GITHUB_SECRET: ${WEBHOOK_GITHUB_SECRET:-}
      WEBHOOK_GITHUB_SECRET_PREVIOUS: ${WEBHOOK_GITHUB_SECRET_PREVIOUS:-}
      LIVE_EVENT_TTL_DAYS: ${LIVE_EVENT_TTL_DAYS:-30}
      LIVE_MAX_ROWS: ${LIVE_MAX_ROWS:-50000}
      LIVE_PROJECT_ALLOWLIST: ${LIVE_PROJECT_ALLOWLIST:-}
    volumes:
      - live-data:/app/data
    ports:
      # Loopback-only host port for the host Tailscale Funnel to target the
      # public /webhooks path. Never 0.0.0.0. /api/live* is reached only via the
      # web sidecar over the compose network and is never published here.
      - "${SYMPHONY_LIVE_BIND:-127.0.0.1}:${SYMPHONY_LIVE_PORT:-18090}:8090"
    # Hardened: the only writable paths are the live-data volume and tmpfs /tmp;
    # all capabilities dropped; no privilege escalation; bounded resources.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:8090/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Read-only UI sidecar: a multi-stage build of packages/ui served by nginx at
  # http://localhost:8080. It serves the daemon-emitted data/contract.json
  # (mounted read-only) at /contract.json, so the UI always renders the loop's
  # latest emit — no hand-seeded fixture. Gated on the daemon being healthy so it
  # never serves before the first contract exists.
  web:
    image: ghcr.io/sympoies/symphony-board-web:${SYMPHONY_IMAGE_TAG:-dev}
    build:
      context: ..
      dockerfile: docker/ui.Dockerfile
    restart: unless-stopped
    # Loopback-only by default (was 0.0.0.0:8080): the UI and the proxied
    # tailnet-only /api/* — including /api/live* — must not be LAN-reachable.
    # Tailnet exposure is done on the host via `tailscale serve` to this loopback
    # port. Set SYMPHONY_WEB_BIND to ONE host interface to widen it; never 0.0.0.0.
    ports:
      - "${SYMPHONY_WEB_BIND:-127.0.0.1}:${SYMPHONY_WEB_PORT:-8080}:80"
    volumes:
      - ../data:/srv/data:ro
    depends_on:
      board:
        condition: service_healthy
      api:
        condition: service_healthy
      live:
        condition: service_started

volumes:
  # The Live receiver's own append-only store, isolated from the canonical
  # ../data bind (which the receiver never mounts).
  live-data:

name: publish-image

# Publish release artifacts on a GitHub Release: public backend daemon and
# read-only UI sidecar images to GHCR, plus unsigned macOS desktop app bundles.
# The Docker workflow smoke-tests local amd64 images before pushing multi-arch
# linux/amd64 + linux/arm64 manifests.
on:
  release:
    types: [published]

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate the published tag against the repo's version files BEFORE anything is
  # published. publish and desktop run in parallel with no ordering, and publish
  # pushes the public GHCR tags with `push: true`; without this prerequisite a
  # manual/retagged release whose tag drifts from package.json would move the
  # container tags and only then fail in desktop packaging, leaving a partially
  # published release. Failing here blocks both downstream jobs first.
  version-gate:
    name: gate release tag vs package.json
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check release version
        run: scripts/check-release-version.sh "$GITHUB_REF_NAME"

  publish:
    name: build, smoke-test, push to GHCR
    needs: version-gate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (board)
        id: board_meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Docker metadata (web)
        id: web_meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-web
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build board amd64 for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          load: true
          tags: symphony-board:smoke
          cache-from: type=gha,scope=board
          cache-to: type=gha,mode=max,scope=board

      - name: Build web amd64 for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/ui.Dockerfile
          platforms: linux/amd64
          load: true
          tags: symphony-board-web:smoke
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Smoke test images
        run: |
          set -euo pipefail

          docker run --rm --entrypoint node \
            -v "$PWD/packages/ui/public/contract.json:/tmp/sample-contract.json:ro" \
            symphony-board:smoke \
            --disable-warning=ExperimentalWarning src/cli/validate-contract.ts \
            --in /tmp/sample-contract.json

          docker run --rm --entrypoint node symphony-board:smoke \
            -e "import('postgres').then(()=>console.log('postgres runtime import ok'))"

          smoke_dir="$(mktemp -d)"
          cleanup() {
            docker rm -f symphony-board-web-smoke >/dev/null 2>&1 || true
            rm -rf "$smoke_dir"
          }
          trap cleanup EXIT

          cp config/sources.example.json "$smoke_dir/sources.json"
          mkdir -p "$smoke_dir/data"
          # The board image runs as non-root (uid 1000); the bind-mounted host
          # data dir (owned by the runner user) must be writable by it.
          chmod 0777 "$smoke_dir/data"
          docker run --rm \
            -v "$smoke_dir/sources.json:/app/config/sources.json:ro" \
            -v "$smoke_dir/data:/app/data" \
            symphony-board:smoke --dry-run
          test -s "$smoke_dir/data/contract.json"

          if docker run --rm --entrypoint node symphony-board:smoke \
            --disable-warning=ExperimentalWarning src/cli/validate-contract.ts \
            --in /app/data/contract.json \
            2>/dev/null; then
              echo "unexpected: image should not contain runtime /app/data/contract.json" >&2
              exit 1
          fi

          docker run --rm symphony-board-web:smoke \
            sh -c 'test ! -e /usr/share/nginx/html/contract.json'

          docker run -d --rm --name symphony-board-web-smoke \
            --add-host board:127.0.0.1 \
            --add-host api:127.0.0.1 \
            --add-host live:127.0.0.1 \
            -p 8080:8080 \
            -v "$PWD/packages/ui/public/contract.json:/srv/data/contract.json:ro" \
            symphony-board-web:smoke
          for _ in $(seq 1 30); do
            # Read the body to a file before grepping: piping `curl | grep -q` lets
            # grep close the pipe on its first match, and with `set -o pipefail`
            # curl's resulting EPIPE (exit 23) fails the whole condition. Harmless
            # for a tiny body, but the demo contract grew past the pipe buffer (~240KB)
            # so curl reliably loses the write race and the check never passed.
            if curl -fsS http://127.0.0.1:8080/ >/dev/null &&
               curl -fsS http://127.0.0.1:8080/contract.json -o "$smoke_dir/web-contract.json" &&
               grep -q '"contract_version":' "$smoke_dir/web-contract.json"; then
              exit 0
            fi
            sleep 1
          done
          docker logs symphony-board-web-smoke || true
          exit 1

      - name: Build and push board multi-arch
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.board_meta.outputs.tags }}
          labels: ${{ steps.board_meta.outputs.labels }}
          cache-from: type=gha,scope=board
          cache-to: type=gha,mode=max,scope=board

      - name: Build and push web multi-arch
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/ui.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.web_meta.outputs.tags }}
          labels: ${{ steps.web_meta.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Verify public GHCR manifests
        run: |
          set -euo pipefail

          token_for() {
            local image_path="$1"
            curl -fsSL \
              "https://ghcr.io/token?service=ghcr.io&scope=repository:${image_path}:pull" |
              python3 -c 'import json, sys; data = json.load(sys.stdin); print(data.get("token") or data.get("access_token") or "")'
          }

          platforms_for() {
            python3 -c 'import json, sys
          data = json.load(sys.stdin)
          platforms = []
          for item in data.get("manifests") or []:
              platform = item.get("platform") or {}
              os = platform.get("os")
              arch = platform.get("architecture")
              if os and arch:
                  platforms.append(f"{os}/{arch}")
          print(" ".join(platforms))'
          }

          verify_ref() {
            local image_ref="$1"
            local image_path tag token manifest platforms

            image_ref="${image_ref#ghcr.io/}"
            image_path="${image_ref%:*}"
            tag="${image_ref##*:}"

            token="$(token_for "$image_path")"
            test -n "$token"
            manifest="$(curl -fsSL \
              -H "Authorization: Bearer $token" \
              -H 'Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json' \
              "https://ghcr.io/v2/${image_path}/manifests/${tag}")"
            platforms="$(printf '%s' "$manifest" | platforms_for)"

            case " $platforms " in
              *" linux/amd64 "*) ;;
              *)
                echo "missing linux/amd64 for ghcr.io/${image_path}:${tag} (platforms: ${platforms:-none})" >&2
                exit 1
                ;;
            esac
            case " $platforms " in
              *" linux/arm64 "*) ;;
              *)
                echo "missing linux/arm64 for ghcr.io/${image_path}:${tag} (platforms: ${platforms:-none})" >&2
                exit 1
                ;;
            esac

            echo "verified public GHCR manifest: ghcr.io/${image_path}:${tag} (${platforms})"
          }

          {
            printf '%s\n' "${{ steps.board_meta.outputs.tags }}"
            printf '%s\n' "${{ steps.web_meta.outputs.tags }}"
          } | while IFS= read -r image_ref; do
            test -n "$image_ref" || continue
            verify_ref "$image_ref"
          done

      - name: Dispatch downstream release
        if: ${{ !github.event.release.prerelease && vars.DEPLOY_DISPATCH_REPOSITORY != '' }}
        env:
          DEPLOY_DISPATCH_REPOSITORY: ${{ vars.DEPLOY_DISPATCH_REPOSITORY }}
          DEPLOY_DISPATCH_EVENT_TYPE: ${{ vars.DEPLOY_DISPATCH_EVENT_TYPE || 'symphony-board-release' }}
          DEPLOY_DISPATCH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_DISPATCH_TOKEN" || {
            echo "DEPLOY_DISPATCH_TOKEN is required when DEPLOY_DISPATCH_REPOSITORY is set" >&2
            exit 1
          }
          case "$DEPLOY_DISPATCH_REPOSITORY" in
            */*) ;;
            *) echo "DEPLOY_DISPATCH_REPOSITORY must be owner/repo" >&2; exit 1 ;;
          esac
          version="${GITHUB_REF_NAME#v}"
          payload="$(
            jq -nc \
              --arg event_type "$DEPLOY_DISPATCH_EVENT_TYPE" \
              --arg version "$version" \
              --arg tag "$GITHUB_REF_NAME" \
              --arg source_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/tag/$GITHUB_REF_NAME" \
              --arg run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
              '{event_type: $event_type, client_payload: {version: $version, tag: $tag, source_url: $source_url, run_url: $run_url}}'
          )"
          curl -fsS \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DEPLOY_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${DEPLOY_DISPATCH_REPOSITORY}/dispatches" \
            -d "$payload"

  desktop:
    name: build unsigned macOS apps (${{ matrix.arch }})
    needs: version-gate
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-26
            target: aarch64-apple-darwin
          - arch: x64
            runner: macos-26-intel
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package unsigned desktop apps
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          scripts/package-desktop-release.sh \
            --version "$version" \
            --target "${{ matrix.target }}" \
            --out-dir dist/release

      - name: Upload desktop release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" dist/release/* --repo "$GITHUB_REPOSITORY" --clobber

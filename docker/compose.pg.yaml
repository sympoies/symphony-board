# Independent Postgres deployment stack. It keeps the same writer/read-only/UI
# split as docker/compose.yaml, but the canonical store lives in the postgres
# service and the emitted contract lives in a stack-private Docker volume.
#
# Run from anywhere with:
#
#   cp config/sources.pg.example.json config/sources.pg.json
#   docker compose -f docker/compose.pg.yaml up -d --build
#   open http://localhost:18080
#
# Tear down only containers/network:
#
#   docker compose -f docker/compose.pg.yaml down
#
# Tear down containers AND the independent Postgres/contract volumes:
#
#   docker compose -f docker/compose.pg.yaml down -v

name: symphony-board-pg

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SYMPHONY_PG_USER:-symphony}
      POSTGRES_PASSWORD: ${SYMPHONY_PG_PASSWORD:-symphony}
      POSTGRES_DB: ${SYMPHONY_PG_DATABASE:-symphony_board}
    ports:
      # Loopback-only inspection port; override or set empty via compose override
      # for shared hosts. The app services use the internal postgres:5432 DNS name.
      - "127.0.0.1:${SYMPHONY_PG_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  board:
    image: ghcr.io/sympoies/symphony-board:${SYMPHONY_IMAGE_TAG:-dev}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      SYNC_MODE: loop
      INTERVAL: "${SYNC_INTERVAL:-300}"
      FULL_EVERY: "30"
      SYNC_FETCH_TIMEOUT_MS: "30000"
      SYMPHONY_CONFIG: config/${SYMPHONY_CONFIG_BASENAME:-sources.pg.json}
      CONTRACT_OUT: data/contract.json
      # The config names this env var via db_url_env; the URL itself stays in
      # container env. If you override credentials, either keep this URL in sync
      # or provide SYMPHONY_DB_URL explicitly.
      SYMPHONY_DB_URL: ${SYMPHONY_DB_URL:-postgres://symphony:symphony@postgres:5432/symphony_board}
      SYNC_CONTROL_ENABLED: "1"
      SYNC_CONTROL_PORT: "8080"
      LOG_CONTROL_ENABLED: "1"
      # Trusted single-user deployments can opt in to Settings -> Sources
      # producer-config edits with a compose override:
      #   CONFIG_CONTROL_ENABLED: "1"
      #   SYMPHONY_SECRETS_FILE: config/secrets.env
      # The container runs non-root (uid 1000); the default config mount below
      # is read-only, which is fine. But enabling config-control means the board
      # WRITES the config dir, so that opt-in override must also mount it RW and
      # ensure it is writable by uid 1000 (e.g. `chown 1000 <config-dir>`).
    env_file:
      - path: ${SYMPHONY_ENV_FILE:-../.env}
        required: false
    volumes:
      - ${SYMPHONY_CONFIG_DIR:-../config}:/app/config:ro
      - contract-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "try{const s=require('fs').statSync('/app/data/contract.json');process.exit(Date.now()-s.mtimeMs<1800000?0:1)}catch{process.exit(1)}"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s

  api:
    image: ghcr.io/sympoies/symphony-board:${SYMPHONY_IMAGE_TAG:-dev}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      SYNC_MODE: api
      SYMPHONY_CONFIG: config/${SYMPHONY_CONFIG_BASENAME:-sources.pg.json}
      SYMPHONY_DB_URL: ${SYMPHONY_DB_URL:-postgres://symphony:symphony@postgres:5432/symphony_board}
      PORT: "8081"
      # The board daemon's emitted contract, mounted read-only below. Source for
      # GET /api/activity-daily (the full-history activity_daily aggregate); must
      # match the board's CONTRACT_OUT.
      CONTRACT_OUT: data/contract.json
      # Safe read-side capability metadata for GET /api/capabilities. The api
      # sidecar probes only the internal Live reads listener; webhook ingress
      # remains deployment-owned and is never proxied by web.
      SYMPHONY_SERVER_MODE: docker
      LIVE_READ_BASE_URL: http://live:8090
      LIVE_PROVIDER_WEBHOOKS: github
      LIVE_WEBHOOK_PUBLIC_URL: ${LIVE_WEBHOOK_PUBLIC_URL:-}
      LIVE_WEBHOOK_PROVIDER: ${LIVE_WEBHOOK_PROVIDER:-}
      LIVE_WEBHOOK_EVENTS: ${LIVE_WEBHOOK_EVENTS:-}
      LIVE_PROJECT_ALLOWLIST: ${LIVE_PROJECT_ALLOWLIST:-}
    env_file:
      - path: ${SYMPHONY_ENV_FILE:-../.env}
        required: false
    volumes:
      - ${SYMPHONY_CONFIG_DIR:-../config}:/app/config:ro
      # Read-only access to the contract volume the board daemon writes, so the
      # api sidecar can serve /api/activity-daily without a store query.
      - contract-data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      board:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:8081/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Least-privilege Live receiver — same as docker/compose.yaml, parameterized
  # for the PG stack. It uses its OWN live-data SQLite volume (Decision 3), NOT
  # the Postgres store: no SYMPHONY_DB_URL, no config mount, no provider token
  # (only the webhook secret by name, via `environment:` interpolation). It runs
  # two listeners (reads vs webhooks); only the webhook listener is published to
  # the host, for deployment-owned public ingress. See docker/compose.yaml for
  # the secret-source note.
  live:
    image: ghcr.io/sympoies/symphony-board:${SYMPHONY_IMAGE_TAG:-dev}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      SYNC_MODE: live
      LIVE_BIND_HOST: 0.0.0.0
      LIVE_PORT: "8090"
      LIVE_WEBHOOK_PORT: "8091"
      LIVE_DB_PATH: data/live.db
      WEBHOOK_GITHUB_SECRET: ${WEBHOOK_GITHUB_SECRET:-}
      WEBHOOK_GITHUB_SECRET_PREVIOUS: ${WEBHOOK_GITHUB_SECRET_PREVIOUS:-}
      LIVE_EVENT_TTL_DAYS: ${LIVE_EVENT_TTL_DAYS:-30}
      LIVE_MAX_ROWS: ${LIVE_MAX_ROWS:-50000}
      LIVE_PROJECT_ALLOWLIST: ${LIVE_PROJECT_ALLOWLIST:-}
    volumes:
      - live-data:/app/data
    ports:
      # Loopback-only host port for deployment-owned public HTTPS ingress, mapped
      # to the WEBHOOK listener (8091). Never 0.0.0.0. /api/live* is reached only via the
      # web sidecar. The default differs from the SQLite stack's 18090 so both
      # stacks can run on one host without a host-port collision (#316 item 9).
      - "${SYMPHONY_PG_LIVE_BIND:-127.0.0.1}:${SYMPHONY_PG_LIVE_PORT:-18091}:8091"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:8090/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    image: ghcr.io/sympoies/symphony-board-web:${SYMPHONY_IMAGE_TAG:-dev}
    build:
      context: ..
      dockerfile: docker/ui.Dockerfile
    restart: unless-stopped
    # Loopback-only by default. To expose the web UI to other devices, set
    # SYMPHONY_PG_WEB_BIND to a specific host interface (e.g. the host's
    # Tailscale IP) in an untracked .env — never 0.0.0.0, and never for the
    # Postgres port below. See .env.example.
    ports:
      # Container listens on 8080 (non-root nginx); host port is unchanged.
      - "${SYMPHONY_PG_WEB_BIND:-127.0.0.1}:${SYMPHONY_PG_WEB_PORT:-18080}:8080"
    volumes:
      - contract-data:/srv/data:ro
    depends_on:
      board:
        condition: service_healthy
      api:
        condition: service_healthy
      live:
        condition: service_started

volumes:
  postgres-data:
  contract-data:
  # The Live receiver's own append-only SQLite store (separate from Postgres).
  live-data:

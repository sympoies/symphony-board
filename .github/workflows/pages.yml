name: pages

# Publish the project website to GitHub Pages:
#   /        -> the static landing page (site/index.html)
#   /demo/   -> the real read-only UI, built once and then served against the
#               frozen real-data demo contract (site/demo-contract.json): a
#               one-shot snapshot of public repos (the sympoies org on GitHub +
#               gitlab-org/labkit on GitLab.com), so every item / commit / review /
#               activity links to a live provider URL. The assemble step overwrites
#               the tiny dev sample (packages/ui/public/contract.json) that vite
#               bundles. Regenerate the snapshot with scripts/demo/build-demo-contract.sh.
#               Backend-only features (live refresh, /api/range, the writer control
#               plane) have no server here and gate themselves off; the
#               contract-driven board renders fully.
# Deploys from main via the Actions artifact flow (no gh-pages branch). The UI's
# vite base is "./" (relative), so it works unchanged under the /symphony-board/
# project sub-path.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "packages/ui/**"
      - "packages/contract/**"
      - "docs/assets/readme-activity.png"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one Pages deploy at a time; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6 # version from package.json packageManager
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version # same Node as fnm uses locally
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The sample contract in packages/ui/public/contract.json is bundled into
      # dist/ by vite, so the demo renders without any server.
      # VITE_SYMPHONY_BOARD_STATIC marks this as a static, API-less deployment: the
      # UI lands on the full contract extent and never fires the ./api/range overlay
      # (which a static host would 404), filtering the loaded contract client-side.
      - run: pnpm --filter @symphony-board/ui run build
        env:
          VITE_SYMPHONY_BOARD_STATIC: "1"
      - name: Assemble site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/demo
          cp -R site/. _site/
          cp docs/assets/readme-activity.png _site/readme-activity.png
          cp packages/ui/public/favicon.svg _site/favicon.svg
          cp -R packages/ui/dist/. _site/demo/
          # Serve the frozen real-data demo contract, not the dev sample vite just
          # bundled into dist/contract.json. This MUST run after the dist copy so it
          # wins; the mv also clears the stray copy `cp -R site/.` left at the root.
          test -f _site/demo-contract.json
          mv _site/demo-contract.json _site/demo/contract.json
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

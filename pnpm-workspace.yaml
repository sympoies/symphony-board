# pnpm workspace. The root package is the buildless backend; LAYER 3 — the
# contract definition the backend produces and the UI consumes — is extracted
# into packages/contract so the three-layer boundary is structural (a consumer
# imports @symphony-board/contract and cannot reach past it into src/db /
# src/sources).
packages:
  - "packages/*"

# pnpm 11 reads build-script policy from here, not the package.json "pnpm" field.
# We keep an explicit, minimal-trust allowlist:
#   * lefthook: false  — its hooks are wired by our own `prepare` script, so we
#     do NOT run the dependency's postinstall (keeps `pnpm install` at exit 0).
#   * esbuild:  true   — Vite's transpiler (packages/ui only); its postinstall
#     installs the platform binary and is REQUIRED for `vite build`. The UI is
#     the deliberate home for a build step + heavy deps (see docs/DESIGN.md), so
#     this one trusted build-tool exception is intentional and scoped to the UI.
#   * @tauri-apps/cli: true — packages/desktop uses the official Tauri CLI
#     binary wrapper to build the local macOS app bundle.
# The backend (root package) still has zero third-party runtime deps.
allowBuilds:
  "@tauri-apps/cli": true
  esbuild: true
  lefthook: false

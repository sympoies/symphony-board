name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Backend (root package) + the contract package: no build, just the type gate
  # and the pure/DB tests. Node strips TS types at runtime without checking them.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # pnpm is the package manager; version comes from package.json packageManager.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version # same Node as fnm uses locally
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm test

  # UI (packages/ui): the one package with a build step + heavy deps. Typecheck +
  # production build + the pure model tests. Kept a separate job so the backend
  # gate above stays buildless.
  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @symphony-board/ui run build
      - run: pnpm --filter @symphony-board/ui run test
      # Headless render smoke: actually render the built board in Chrome and
      # assert it draws (item cards + all 3 edge lifecycle buckets) with zero
      # console errors. Catches render-only crashes that tsc/build/unit tests
      # can't (e.g. the reserved-`ref`-prop bug in PR #3).
      - uses: browser-actions/setup-chrome@v1
        id: chrome
      - run: pnpm --filter @symphony-board/ui run smoke
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}

name: deploy-g14

# Deploy the released GHCR image to the personal g14 host (single Ubuntu box,
# Docker Compose reconciled from the private graysurf/g14-infra repo, exposed
# only over Tailscale). The job runs on a self-hosted runner that lives ON g14,
# so the deploy is outbound-only — nothing inbound to g14 is exposed.
#
# SECURITY — public repo + self-hosted runner. This workflow triggers ONLY:
#   * after `publish-image` completes successfully (publish-image itself only
#     runs on `release: published`, a maintainer-gated action), or
#   * on manual `workflow_dispatch` (maintainer-gated).
# It MUST NEVER gain a `pull_request` / `pull_request_target` trigger — that is
# the one path that would let a fork's PR execute code on the g14 runner. The
# job also does not check out this repo; it only pulls the trusted, private
# g14-infra checkout and runs `docker compose`, so no PR-provided code runs here.
#
# A `gate` job (on ubuntu-latest, NOT g14) decides whether the trigger should
# actually redeploy. publish-image runs for prereleases too but only moves the
# `:latest` tag for stable releases, and the workflow_run event carries no
# prerelease flag — so publish-image records it in a `deploy-meta` artifact the
# gate reads. The g14 deploy job runs only when the gate says deploy; this keeps
# the artifact fetch off the self-hosted runner.

on:
  workflow_run:
    workflows: ["publish-image"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-g14
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  gate:
    name: decide whether to deploy
    runs-on: ubuntu-latest
    # Manual dispatch always; workflow_run only when publish-image succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      actions: read
    outputs:
      deploy: ${{ steps.decide.outputs.deploy }}
    steps:
      - name: Fetch publish metadata from the triggering run
        if: ${{ github.event_name == 'workflow_run' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: deploy-meta
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: deploy-meta
      - name: Decide whether this trigger should redeploy
        id: decide
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — deploying."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "$(cat deploy-meta/prerelease 2>/dev/null || echo missing)" = "false" ]; then
            echo "Stable release publish — :latest was updated; deploying."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "Prerelease publish (or missing metadata) — :latest was not moved; skipping the g14 redeploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: pull + redeploy on g14
    needs: gate
    if: ${{ needs.gate.outputs.deploy == 'true' }}
    runs-on: [self-hosted, g14, deploy]
    timeout-minutes: 15
    steps:
      - name: Pull g14-infra and redeploy the symphony-board stack
        run: |
          set -euo pipefail
          infra="$HOME/Project/graysurf/g14-infra"
          test -d "$infra/.git" || { echo "g14-infra checkout missing at $infra" >&2; exit 1; }
          # The g14-infra checkout is DEPLOY-ONLY: force it to match origin/main
          # with a hard reset rather than `pull --ff-only`, so the deploy never
          # aborts on local drift to tracked files. Gitignored host .env files
          # and untracked paths are left untouched. Edit stacks via a PR to
          # g14-infra — never by hand on this checkout.
          git -C "$infra" fetch --quiet origin main
          git -C "$infra" reset --hard origin/main
          cd "$infra/stacks/symphony-board"
          # Pull the freshly published :latest image and reconcile the stack.
          # Reuses the existing named volumes (postgres-data / contract-data).
          docker compose --env-file .env up -d --pull always
          docker compose --env-file .env ps --format 'table {{.Service}}\t{{.Image}}\t{{.Status}}'

[package]
name = "symphony-board-android"
version = "1.5.2"
description = "Android thin-client shell for symphony-board"
authors = ["sympoies"]
edition = "2021"

[lib]
name = "symphony_board_android"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
# `gzip` enables reqwest gzip negotiation + transparent decompression, so this
# client sends Accept-Encoding: gzip and decodes the compressed contract the UI
# sidecar serves (see docker/ui-nginx.conf). The Android shell loads the same
# remote contract through @tauri-apps/plugin-http, so without it the mobile
# client fetches it uncompressed even when the server offers gzip — matching the
# desktop and standalone crates.
tauri-plugin-http = { version = "2", features = ["gzip"] }
tauri-plugin-opener = "2"

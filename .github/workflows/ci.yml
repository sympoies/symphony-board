name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # pnpm is the package manager; version comes from package.json packageManager.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version # same Node as fnm uses locally
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Node strips TS types at runtime without checking them; tsc is the gate.
      - run: pnpm run typecheck
      - run: pnpm test

# nginx config for the UI sidecar. Serves the built dist/ as a static site and
# the loop daemon's contract from the bind-mounted data dir, so the UI always
# renders the daemon's latest emit (the daemon is the sole writer).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The daemon-emitted contract, served straight from data/contract.json
    # (mounted read-only at /srv/data). The UI fetches "./contract.json"; no-store
    # so a reload always pulls the freshest emit rather than a cached copy.
    location = /contract.json {
        alias /srv/data/contract.json;
        default_type application/json;
        add_header Cache-Control "no-store";
    }

    # The board is a hash-routed SPA (#/, #/graph, #/debug), so every path that
    # is not a real asset resolves to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
